# Add, update, or remove items in the customer's Tesco basket.
#
# items: Array of BasketLineItemInputType, each with:
#   - id (Int, required): Product ID (TPNC/baseProductId)
#   - value (Int, required): Quantity to set (0 = remove item)
#
# basketContexts: Array of BasketContextType, each with:
#   - type (String): "GROCERY" for grocery, "FNF" for F&F clothing, "MARKETPLACE" for marketplace
#   - primary (Boolean): true for the main context
#
#
# Example items: [{ "id": 320532549, "value": 1 }, { "id": 316515947, "value": 2 }]
# Example basketContexts: [{ "type": "FNF", "primary": true }]
#
# Returns: Full basket state including guide price, items, promotions, delivery info

mutation UpdateItems($items: [BasketLineItemInputType], $basketContexts: [BasketContextType]) {
  basket(items: $items, basketContexts: $basketContexts) {
    guidePrice
    savings
    staffDiscount {
      percentage
      discount
    }
    shoppingMethod
    deliveryAddress {
      name
      addressId: id
      addressLine1
      isBusinessAddress
    }
    deliveryPreferences {
      deliveryInstruction
      isBagless
    }
    charges {
      surcharge
      minimumBasketValue: minimum
      bagCharge
    }
    promotions {
      startDate
      endDate
      offerText: description
      promotionId: id
    }
    items {
      quantity
      cost
      weight
      bulkBuyLimitReached
      groupBulkBuyLimitReached
      originalQuantity
      originalWeight
      isNewlyAdded
      substitutionOption
      pickerNote
      unit
      product {
        id
        baseProductId
        title
        shortDescription
        displayType
        averageWeight
        bulkBuyLimit
        groupBulkBuyLimit
        timeRestrictedDelivery
        restrictedDelivery
        displayType
        isForSale
        status
        price {
          price: actual
          unitPrice
          unitOfMeasure
        }
        defaultImageUrl
        maxQuantityAllowed: bulkBuyLimit
        promotions {
          id
          startDate
          endDate
          description
          timesTriggered
          missed
          warnings {
            threshold
            type
          }
        }
      }
    }
  }
}
