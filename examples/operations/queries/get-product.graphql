# Fetch a single product by TPNC code.
# Returns different product types based on proposition:
#   - __typename: "ProductType"  → Grocery product
#   - __typename: "MPProduct"    → Marketplace product
#   - __typename: "FNFProduct"   → F&F (clothing) product, may have additional fields
#
# Always check __typename in the response to identify the proposition
# before presenting results or taking further action.
#
# Arguments:
#   tpnc : Tesco Product Number Code
#
# Returns: id, description, images, proposition type

query GetProduct($tpnc: String) {
  product(tpnc: $tpnc) {
    __typename
    id
    gtin
    uuid
    subBrand
    brandName
    baseProductId
    shelfLife {
      url
      message
    }
    averageWeight
    bulkBuyLimit
    defaultImageUrl
    media {
      defaultImage {
        url
        aspectRatio
      }
      images {
        url
        aspectRatio
        ... on ModelImage {
          modelHeight
          modelWearingSize
        }
      }
    }
    overlays {
      name
      value
    }
    manufacturerAddress {
      addressLine1
      addressLine2
      addressLine3
      addressLine4
      addressLine5
      addressLine6
    }
    importerAddress {
      addressLine1
      addressLine2
      addressLine3
      addressLine4
      addressLine5
      addressLine6
    }
    returnTo {
      addressLine1
      addressLine2
      addressLine3
      addressLine4
      addressLine5
      addressLine6
      addressLine7
      addressLine8
      addressLine9
      addressLine10
      addressLine11
      addressLine12
    }
    depositAmount
    description
    title
    isForSale
    status
    superDepartmentName
    superDepartmentId
    departmentName
    departmentId
    aisleName
    aisleId
    shelfName
    shelfId
    alternativeCategories {
      superDepartmentName
      superDepartmentId
      departmentName
      departmentId
      aisleName
      aisleId
      shelfName
      shelfId
    }
    displayType
    productType
    maxWeight
    minWeight
    increment
    catchWeightList {
      price
      weight
      default
    }
    details {
      clothingInfo {
        pattern
        clothingStyle
        clothingProductLength
        sleeveLength
        targetAudience
        fibreComposition
        specialFeature
        careInstructions
        sizeChart {
          url
          id
        }
      }
      energyEfficiency {
        class
        energyClassUrl
        productInfoDoc
      }
      specifications {
        specificationName
        specificationAttributes {
          name
          value
        }
      }
      components {
        ... on AllergenInfoType {
          __typename
          text
        }
        ... on CompetitorsInfo {
          competitors {
            __typename
            id
            priceMatch {
              isMatching
            }
          }
        }
        ... on AdditionalInfo {
          __typename
          isLowEverydayPricing
        }
      }
      specifications {
        specificationName
        specificationAttributes {
          ... on NameValuePairType {
            attributeName: name
            attributeValue: value
          }
        }
      }
      ingredients
      packSize {
        value
        units
      }
      allergenInfo: allergens {
        name
        values
      }
      marketingTextInfo: marketing
      storage
      nutritionInfo: nutrition {
        name
        perComp: value1
        perServing: value2
        referenceIntake: value3
        referencePercentage: value4
      }
      gda {
        name
        value
        percent
        rating
      }
      numberOfUses
      preparationAndUsage
      cookingInstructions {
        oven {
          chilled {
            time
            instructions
            temperature {
              value
            }
          }
          frozen {
            time
            instructions
            temperature {
              value
            }
          }
        }
        microwave {
          chilled {
            detail {
              step
              T650
              T750
              T850
            }
            instructions
          }
          frozen {
            detail {
              step
              T650
              T750
              T850
            }
            instructions
          }
        }
        cookingMethods {
          name
          instructions
          time
        }
        otherInstructions
        cookingGuidelines
        cookingPrecautions
      }
      freezingInstructions {
        standardGuidelines
        freezingGuidelines
        defrosting
      }
      productMarketing
      additives
      warnings
      netContents
      drainedWeight
      safetyWarning
      lowerAgeLimit
      upperAgeLimit
      healthmark
      recyclingInfo
      alcoholInfo: alcohol {
        tastingNotes
        grapeVariety
        vinificationDetails
        history
        regionalInformation
        storageType
        storageInstructions
        alcoholUnitsOtherText
        regionOfOrigin
        alcoholType
        wineColour
        alcoholUnits
        percentageAlcohol
        currentVintage
        producer
        typeOfClosure
        wineMaker
        packQty
        packMeasure
        country
        tasteCategory
        alcoholByVolumeOtherText
        wineEffervescence
        legalNotice {
          message
        }
      }
      dosage
      healthClaims
      boxContents
      nutritionalClaims
      hazardInfo {
        chemicalName
        productName
        signalWord
        symbolCodes
        statements
      }
    }
    multiPackDetails {
      name
      description
      sequence
      storage
      numberOfUses
      features
      boxContents
      nutritionIconInfo
      otherInformation
      ingredients
      nutritionalClaims
      healthClaims
      preparationAndUsage
      cookingInstructions {
        oven {
          chilled {
            time
            instructions
            temperature {
              value
            }
          }
          frozen {
            time
            instructions
            temperature {
              value
            }
          }
        }
        microwave {
          chilled {
            detail {
              step
              T650
              T750
              T850
            }
            instructions
          }
          frozen {
            detail {
              step
              T650
              T750
              T850
            }
            instructions
          }
        }
        cookingMethods {
          name
          instructions
          time
        }
        otherInstructions
        cookingGuidelines
        cookingPrecautions
      }
      originInformation {
        title
        value
      }
      gda {
        name
        value
        percent
        rating
      }
      allergenInfo: allergens {
        name
        values
      }
      nutritionInfo {
        name
        perComp: value1
        perServing: value2
        referenceIntake: value3
        referencePercentage: value4
      }
    }
    price {
      price: actual
      unitPrice
      unitOfMeasure
    }
    promotions {
      promotionId: id
      startDate
      endDate
      offerText: description
    }
    reviews {
      stats {
        noOfReviews
        ratingsDistribution {
          name
          value
        }
      }
    }
    seller {
      id
      name
      logo {
        url
      }
    }
    fulfilment {
      __typename
      ... on ProductDeliveryType {
        cutoff
        deliveryType
        minDeliveryDays
        maxDeliveryDays
        charges {
          value
          __typename
          criteria {
            __typename
            ... on ProductDeliveryCriteria {
              deliveryType: type
              deliveryvalue: value
            }
            ... on ProductDeliveryBasketValueCriteria {
              type
              value
            }
          }
        }
      }
      ... on ProductReturnType {
        __typename
        daysToReturn
      }
    }
  }
}
